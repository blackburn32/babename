bio:
  headline: About [Us]{.text-primary}
  content: |
    At the intersection of indie rock, dreamy pop, and jangly folk one finds the fearlessly vulnerable world of babename. Jamie Averley writes from the heart -- specifically the heart of a pandemic-times-baby-queer stumbling their way into a life worth living. Mildly awkward and painfully sincere, babename looks at the world through reborn eyes. With gentle wit and melody, their journal-esque overshares bring us into journey through fantasies of new beginnings, sapphic yearning, and musings on identity, power, and possibility.

    For as long as they can remember, music has been the way Jamie Averley makes sense of the world. Songwriting offers both a window into someone’s thoughts and an emotional outlet in a way no other form of writing can. That sense of connection - between sound, story, and self - has guided their path from early piano lessons to the deeply personal songs that now define the debut record from babename.

    Growing up, Averley found community wherever music lived: in school jazz and marching bands, in college rock projects, and long afternoons spent teaching themself guitar. But the deeper journey began when songwriting became a way to translate emotion into meaning; lyric- forward sketches of identity, belonging, and transformation unfurl like entries in an ever-evolving journal.

    Their listening history traces that evolution. Punk-pop and grunge gave voice to teenage alienation; the art-minded alternative rock of the 1990’s opened new emotional landscapes, and protest anthems from the 60s to the present revealed that music could hold both moral clarity and rebellion. Later, as Pacific Northwest neofolk acts (Fleet Foxes, The Head and the Heart) found their way into rotation, Averley began to see how songs could tell stories that meet a listener right where they are - and leave them changed.

    That revelation deepened in 2015, when they discovered Kithkin, Seattle’s self-described “Cascadian Treepunk” band. “They danced in the face of collapse,” Averley recalls. “They brought noise, melody, and wild percussion to stories of destruction and hope. It hit me on a personal, political, and visceral level in a way no other artist had.”

    By 2020, during a period of solitude and self-reckoning, music became even more intertwined with identity. Coming into their trans identity opened new creative doors, as artists born of the emotionally literate, confessional queer indie scene of the late 2010s (Boygenius, MUNA, Katie Pruitt) offered both representation and liberation. “They were claiming their identities, unpacking trauma, and giving the community something joyous to come together to,” Averley says. “It reminded me that music could be more than the sum of its parts. It reminded me that it could be freeing.”

    Songwriting classes through School of Song soon followed, including sessions with Robin Pecknold, Miya Folick, and producer Philip Weinrobe (Adrienne Lenker, Billie Martin). Writing a song a week, Averley learned to quiet their inner critic and trust the imperfection of an honest voice. What began as an exercise in craft became a practice in self-acceptance. Emboldened by Weinrobe’s challenge to release an album by their next birthday, Averley set to work. Early demos recorded in a cabin in Auburn, Washington, evolved into a full-band studio record tracked at Studio Litho and Earwig Tacoma, featuring Jamie Averley (vocals, guitar), Dylan Schillinger (lead guitar), Jessica Wetter (bass), Alex Blackburn (drums), and a handful of guest musicians.

    Highlights is a time capsule of transformation. A collection of songs about queerness, self-discovery, loss, and the courage to return to oneself. It explores the tension between leavingand coming home, the ghosts of religious trauma, the ache of global upheaval, and the beautyof finally taking up space in one’s own story.

    “Coming out is a process, not an event,” Averley reflects. “Each of us is becoming someone new every day we exist. If this record can be a salve for even one queer, trans, or questioning kid… if it gives someone permission to love and embrace who they are, then everything I’ve put into this was worth it.”

    Still early in their career, Averley approaches their art with gratitude and curiosity. Each deeper step - writing, recording, performing - has returned meaning tenfold. “My heart lives very much on my sleeve, which is what feels sincere to me, and I think matches my desire to make art that is grounded in queer storytelling and connection” says Averley. “My voice, even as it wavers, has something to say,” they add. “These songs have given me clarity and self-knowledge. I only hope they can do the same for someone else.”

pressHits:
  headline: Press [Hits]{.text-primary}
  description: Selected press coverage and reviews.
  items:
    - title: Space 101 FM
      description: "Radio Play, The Wave Show"
    - title: "Track Review - Charles I"
      description: "Girl at the Rock Show"
      outlet: Girl at the Rock Show
      quote: "\"Charles I\" is the perfect reminder to be yourself and stay true to yourself in a world that is constantly trying to put you into a box. Don't want to get that deep with things today? Have no fear, this song is also one of those tracks that is just truly lovely to listen to."
      image: https://scontent-sea5-1.xx.fbcdn.net/v/t39.30808-6/241082975_246837860777521_2883764545703458353_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=CpCL_bJ_QiAQ7kNvwFBlduz&_nc_oc=Adn1oT5qLDyiIOl_DlyBW3VT5lA864oRb_I3uFmkMq4CcYGrz5wmjKGYfkceBV6upNY&_nc_zt=23&_nc_ht=scontent-sea5-1.xx&_nc_gid=K9N0KO5f4eeiduOFBEAkWQ&_nc_ss=8&oh=00_AfxFn6l5zW4rbP6IjTnITwhtMj6dJKR5xg9WJxKH9l5lbg&oe=69B79141
      to: https://girlattherockshows.com/2025/11/16/babename-charles-i/
    - title: "Track Premier - Highlights (single)"
      description: "Rock and Roll Globe"
      outlet: Rock and Roll Globe
      quote: "Highlights is \"a poignant collection of songs about queer strength in the face of old trauma and new adversity, and finally channeling one's energy into an absolute truth.\""
      image: http://rockandrollglobe.com/wp-content/uploads/2019/02/Ron-Hart-96x96.jpg
      to: https://rockandrollglobe.com/rock/listen-babename-shares-highlights/
    - title: "Album Premier - Highlights"
      description: "Ghettoblaster Magazine"
      outlet: Ghettoblaster Magazine
      image: https://secure.gravatar.com/avatar/fe8c300aeba6d8bd80254e94c0b6382ea61cfd521b2964e6725bf1f107d0260e?s=90&d=mm&r=g
      to: https://ghettoblastermagazine.com/features/album-stream/babename-highlights/
    - title: "Album Review - Highlights"
      description: "Loud Women"
      outlet: Loud Women
      quote: "Intellectually dense, politically charged, and lyrically haunting. Averley's ethereal, stacked vocals give the listener the impression of being inside the narrator's head, an intimate moment in time for each track on their debut album. While Seattle is home to quite a few dreamy indie/pop bands, make no mistake, babename is not nameless in the crowd."
      image: https://2.gravatar.com/avatar/0920d971281420cbf9d9ebfabd1f1e0df6c97cf83949563fb88953ffb103db61?d=identicon&r=g&s=256
      to: https://loudwomen.org/2026/02/27/babenames-debut-album-highlights-is-a-story-of-claiming-personal-power/
    - title: KBCS
      description: "Radio Play"

